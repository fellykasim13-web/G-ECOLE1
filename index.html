<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Scolaire Pro</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    background:rgba(0,0,0,0.4);
}

/* BACK */
#backBtn{
    position:fixed;
    top:10px;
    left:10px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
    display:none;
    z-index:999;
}

/* CONTAINER */
.container{
    max-width:750px;
    margin:auto;
    padding:15px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    padding:12px;
    margin:10px 0;
    border-radius:12px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.orange{background:#f59e0b;color:black;}

.hidden{display:none;}

</style>
</head>

<body>

<header>📚 Gestion Scolaire PRO</header>

<button id="backBtn" onclick="goHome()">⬅ Retour</button>

<div class="container">

<!-- HOME -->
<div id="home">

    <h3>Choisir un mode</h3>

    <button class="blue" onclick="openParent()">👪 Mode Parent</button>
    <button class="green" onclick="openAdmin()">👨‍🏫 Mode Directeur</button>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

    <h3>👨‍🏫 Directeur</h3>

    <input id="nom" placeholder="Nom élève">
    <input id="classe" placeholder="Classe">

    <input id="math" placeholder="Note Math">
    <input id="fr" placeholder="Note Français">
    <input id="sc" placeholder="Note Science">

    <button class="green" onclick="add()">Ajouter élève</button>
    <button class="blue" onclick="show()">Afficher élèves</button>

    <div id="list"></div>

</div>

<!-- PARENT -->
<div id="parent" class="hidden">

    <h3>👪 Mode Parent</h3>

    <input id="search" placeholder="ID élève (ex: E1)">

    <button class="blue" onclick="search()">Rechercher</button>

    <div id="result"></div>

</div>

</div>

<script>

/* DATA */
let data = JSON.parse(localStorage.getItem("eleves")) || [];

/* NAV */
function showBack(v){
    document.getElementById("backBtn").style.display = v ? "block" : "none";
}

function goHome(){
    hideAll();
    document.getElementById("home").style.display="block";
    showBack(false);
}

function hideAll(){
    document.getElementById("home").style.display="none";
    document.getElementById("admin").style.display="none";
    document.getElementById("parent").style.display="none";
}

/* OPEN */
function openParent(){
    hideAll();
    document.getElementById("parent").style.display="block";
    showBack(true);
}

function openAdmin(){
    hideAll();
    document.getElementById("admin").style.display="block";
    showBack(true);
}

/* ADD */
function add(){

    let n = document.getElementById("nom").value.trim();
    let c = document.getElementById("classe").value.trim();

    let m = parseFloat(document.getElementById("math").value) || 0;
    let f = parseFloat(document.getElementById("fr").value) || 0;
    let s = parseFloat(document.getElementById("sc").value) || 0;

    if(!n || !c){
        alert("Remplis nom et classe !");
        return;
    }

    let moy = ((m+f+s)/3).toFixed(2);

    let id = "E" + (data.length + 1);

    data.push({
        id:id,
        nom:n,
        classe:c,
        math:m,
        fr:f,
        sc:s,
        moy:moy
    });

    localStorage.setItem("eleves", JSON.stringify(data));

    alert("Élève ajouté avec ID: " + id);
}

/* SHOW ADMIN */
function show(){

    let box = document.getElementById("list");
    box.innerHTML="";

    if(data.length === 0){
        box.innerHTML="<div class='card'>Aucun élève</div>";
        return;
    }

    data.forEach(e=>{
        box.innerHTML += `
        <div class="card">
            🆔 ${e.id}<br>
            👤 ${e.nom}<br>
            📘 ${e.classe}<br>
            🧮 Moyenne: ${e.moy}<br>
        </div>
        `;
    });
}

/* SEARCH PARENT */
function search(){

    let id = document.getElementById("search").value.trim().toUpperCase();

    let found = data.find(e => e.id === id);

    let result = document.getElementById("result");
    result.innerHTML="";

    if(!found){
        result.innerHTML="<div class='card'>Aucun élève trouvé</div>";
        return;
    }

    result.innerHTML=`
    <div class="card">
        🆔 ${found.id}<br>
        👤 ${found.nom}<br>
        📘 ${found.classe}<br>
        🧮 Moyenne: ${found.moy}<br>

        Math: ${found.math}<br>
        Français: ${found.fr}<br>
        Science: ${found.sc}<br>

        <button onclick="exportPDF('${found.id}')">📄 Export PDF</button>
    </div>
    `;
}

/* EXPORT PDF */
function exportPDF(id){

    let e = data.find(x => x.id === id);

    let w = window.open("", "_blank");

    w.document.write(`
    <html>
    <head>
        <title>Fiche élève</title>
        <style>
            body{font-family:Arial;padding:20px;}
            h2{text-align:center;}
            .box{border:1px solid #000;padding:10px;border-radius:10px;}
        </style>
    </head>
    <body>
        <h2>📄 Fiche élève</h2>

        <div class="box">
            🆔 ${e.id}<br>
            👤 ${e.nom}<br>
            📘 ${e.classe}<br><br>

            Math: ${e.math}<br>
            Français: ${e.fr}<br>
            Science: ${e.sc}<br><br>

            🧮 Moyenne: ${e.moy}
        </div>

        <script>
            window.print();
        <\/script>
    </body>
    </html>
    `);

    w.document.close();
}

</script>

</body>
</html>
