<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Manager Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  transition:0.3s;
}

body.directeur{
  background:linear-gradient(135deg,#0b3d2e,#14532d);
}

body.enseignant{
  background:linear-gradient(135deg,#1e1b4b,#312e81);
}

#loader{
  display:none;
  position:fixed;
  inset:0;
  background:#000000aa;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.spinner{
  width:45px;height:45px;
  border:5px solid #ccc;
  border-top:5px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

section{
  display:none;
  text-align:center;
  padding:40px 20px;
}

.show{display:block;}

button{
  padding:12px 18px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:#38bdf8;color:white;}
.secondary{background:#1e40af;color:white;}
.back{background:transparent;border:1px solid white;color:white;}

input{
  padding:10px;
  width:80%;
  max-width:320px;
  margin:5px;
  border:none;
  border-radius:6px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:15px;
  margin:10px auto;
  max-width:420px;
  border-radius:10px;
}

.item{
  background:rgba(255,255,255,0.1);
  margin:5px;
  padding:8px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<section id="accueil" class="show">
  <h1>📚 School Manager Pro</h1>
  <button class="primary" onclick="start(1)">Nouvelle école</button>
  <button class="secondary" onclick="start(2)">Connexion</button>
</section>

<section id="roles">
  <h2>Choisir rôle</h2>
  <button class="primary" onclick="openForm('directeur')">Directeur</button>
  <button class="secondary" onclick="openForm('enseignant')">Enseignant</button>
  <button class="back" onclick="back()">Retour</button>
</section>

<section id="directeur">
  <h2>Créer école</h2>
  <input placeholder="Nom école">
  <input placeholder="Nom directeur">
  <input placeholder="ID école">
  <input type="password" placeholder="Mot de passe">
  <button class="primary" onclick="creerEcole()">Créer</button>
  <button class="back" onclick="back()">Retour</button>
</section>

<section id="enseignant">
  <h2>Créer enseignant</h2>
  <input id="ensNom" placeholder="Nom">
  <input id="ensMdp" type="password" placeholder="Mot de passe">
  <input id="ensEcole" placeholder="ID école">
  <button class="secondary" onclick="creerEnseignant()">Créer</button>
  <button class="back" onclick="back()">Retour</button>
</section>

<section id="login">
  <h2>Connexion</h2>
  <input placeholder="ID école">
  <input placeholder="ID classe">
  <input type="password" placeholder="Mot de passe">
  <button class="primary" onclick="login()">Connexion</button>
  <button class="back" onclick="back()">Retour</button>
</section>

<section id="dashboard">

  <h2>Dashboard</h2>
  <p id="mode"></p>
  <p id="userInfo"></p>

  <div class="card">
    <h3>Élèves</h3>
    <input id="nomEleve" placeholder="Nom">
    <input id="classeEleve" placeholder="Classe">
    <button onclick="addEleve()">Ajouter</button>
    <div id="listEleves"></div>
  </div>

  <div class="card" id="ensCard">
    <h3>Enseignants</h3>
    <input id="nomEns" placeholder="Nom">
    <button onclick="addEns()">Ajouter</button>
    <div id="listEns"></div>
  </div>

  <button class="back" onclick="back()">Déconnexion</button>

</section>

<script>

let db = JSON.parse(localStorage.getItem("db")) || {};
let currentSchool = null;
let role = "";
let currentUser = "";

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

function load(){document.getElementById("loader").style.display="flex";}
function unload(){document.getElementById("loader").style.display="none";}

function start(t){
  load();
  setTimeout(()=>{
    unload();
    show(t===1?"roles":"login");
  },500);
}

function openForm(r){show(r);}
function back(){show("accueil");}

function saveDB(){
  localStorage.setItem("db",JSON.stringify(db));
}

function creerEcole(){

  let i=document.querySelectorAll("#directeur input");

  if([...i].some(x=>!x.value)) return alert("Remplis tout");

  let id=i[2].value;
  let idClasse="D"+Math.floor(Math.random()*9000)+"R";

  db[id]={
    info:{
      nom:i[0].value,
      directeur:i[1].value,
      mdp:i[3].value,
      idClasse:idClasse
    },
    eleves:[],
    enseignants:[]
  };

  saveDB();

  alert("École créée\nID: "+id+"\nClasse: "+idClasse);

  show("login");
}

function creerEnseignant(){

  let nom=document.getElementById("ensNom").value;
  let mdp=document.getElementById("ensMdp").value;
  let idEcole=document.getElementById("ensEcole").value;

  if(!nom || !mdp || !idEcole) return alert("Remplis tout");
  if(!db[idEcole]) return alert("École introuvable");

  db[idEcole].enseignants.push({
    nom,
    mdp,
    idEcole
  });

  saveDB();

  currentSchool=idEcole;
  currentUser=nom;

  show("login");
}

function login(){

  let i=document.querySelectorAll("#login input");

  let idE=i[0].value;
  let idC=i[1].value;
  let mdp=i[2].value;

  let school=db[idE];

  if(!school) return alert("École introuvable");

  load();

  setTimeout(()=>{

    unload();

    if(idC===school.info.idClasse && mdp===school.info.mdp){
      currentSchool=idE;
      role="directeur";
      currentUser=school.info.directeur;
      openDashboard();
      return;
    }

    let ens=school.enseignants.find(e=>e.mdp===mdp && e.idEcole===idE);

    if(ens){
      currentSchool=idE;
      role="enseignant";
      currentUser=ens.nom;
      openDashboard();
      return;
    }

    alert("Erreur connexion");

  },500);
}

function openDashboard(){
  show("dashboard");
  document.body.className=role;
  document.getElementById("mode").innerText=role;
  document.getElementById("userInfo").innerText="Connecté : "+currentUser;
  render();
  if(role!=="directeur"){
    document.getElementById("ensCard").style.display="none";
  }else{
    document.getElementById("ensCard").style.display="block";
  }
}

function addEleve(){

  if(role!=="directeur") return;

  db[currentSchool].eleves.push({
    nom:nomEleve.value,
    classe:classeEleve.value
  });

  saveDB();
  render();
}

function addEns(){

  if(role!=="directeur") return;

  db[currentSchool].enseignants.push({
    nom:nomEns.value
  });

  saveDB();
  render();
}

function render(){

  let e=document.getElementById("listEleves");
  let t=document.getElementById("listEns");

  e.innerHTML="";
  t.innerHTML="";

  db[currentSchool].eleves.forEach(x=>{
    e.innerHTML+=`<div class="item">${x.nom}-${x.classe}</div>`;
  });

  if(role==="directeur"){
    db[currentSchool].enseignants.forEach(x=>{
      t.innerHTML+=`<div class="item">${x.nom}</div>`;
    });
  }
}

</script>

</body>
</html>
