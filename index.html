<script>  
  console.log("SCRIPT CHARGÉ");  
// ================= FIREBASE =================  
const firebaseConfig = {  
  apiKey: "AIzaSyDcgJDckF9vejT476nYTGHAwa75dotPkMA",  
  authDomain: "multi-ecole.firebaseapp.com",  
  databaseURL: "https://multi-ecole-default-rtdb.europe-west1.firebasedatabase.app",  
  projectId: "multi-ecole",  
  storageBucket: "multi-ecole.firebasestorage.app",  
  messagingSenderId: "421233691634",  
  appId: "1:421233691634:web:c6884b8250c8cd1b7b796b"  
};  
  
firebase.initializeApp(firebaseConfig);  
  
const auth = firebase.auth();  
const db = firebase.database();  
let currentUser = null;  
let usersList = [];  
let currentChat = null;  
  
// ================= NAVIGATION =================  
function go(page){  
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));  
  document.getElementById(page).classList.add("active");  
}  
  
function back(){  
  go("dashboard");  
}  
  
// ================= INSCRIPTION =================  
function register(){  
  let name = document.getElementById("regName").value;  
  let email = document.getElementById("regEmail").value;  
  let pass = document.getElementById("regPass").value;  
  let role = document.getElementById("regRole").value;  
  
  let photo = "https://i.imgur.com/1X7Qq7C.png"; // default avatar  
  
  auth.createUserWithEmailAndPassword(email, pass)  
  .then(user => {  
    db.ref("users/" + user.user.uid).set({  
      name,  
      email,  
      role,  
      photo  
    });  
  
    alert("Compte créé !");  
    go("login");  
  });  
}  
  
// ================= LOGIN (CORRIGÉ) =================  
function login(){  
  let email = document.getElementById("logEmail").value;  
  let pass = document.getElementById("logPass").value;  
  
  document.getElementById("loginError").innerText = "";  
  
  if(email === "" || pass === ""){  
    document.getElementById("loginError").innerText = "Remplis tous les champs";  
    return;  
  }  
  
  auth.signInWithEmailAndPassword(email, pass)  
  .then(user => {  
    loadUser(user.user.uid);  
  })  
  .catch(err => {  
    document.getElementById("loginError").innerText = err.message;  
    console.log("LOGIN ERROR:", err);  
  });  
}  
  
// ================= CHARGER USER =================  
function loadUser(uid){  
  currentUser = uid;  
  
  db.ref("users/" + uid).once("value").then(snap => {  
    let data = snap.val();  
  
    document.getElementById("welcome").innerText = "Bienvenue " + data.name;  
    document.getElementById("roleText").innerText = "Rôle : " + data.role;  
  
    document.getElementById("eleveBox").style.display = "none";  
    document.getElementById("teacherBox").style.display = "none";  
  
    if(data.role === "eleve"){  
      document.getElementById("eleveBox").style.display = "block";  
    } else {  
      document.getElementById("teacherBox").style.display = "block";  
    }  
  
    loadUsers(); // 👈 AJOUT CHAT  
    go("dashboard");  
  });  
}  
function loadUsers(){  
  
  // 🔥 mettre l'utilisateur actuel en ligne  
  db.ref("users/" + currentUser).update({  
    online: true  
  });  
  
  // 🔥 hors ligne quand quitte  
  window.onbeforeunload = () => {  
    db.ref("users/" + currentUser).update({online:false});  
  };  
  
  // charger liste users  
  db.ref("users").once("value").then(snap => {  
    usersList = snap.val();  
    console.log("Users loaded:", usersList);  
  });  
}  
// ================= LOGOUT =================  
function logout(){  
  auth.signOut();  
  go("home");  
}  
function openPage(page){  
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));  
  document.getElementById(page).classList.add("active");  
  
  if(page === "chat"){  
    loadContacts();  
  }  
  
  // 🔥 AJOUT IMPORTANT  
  if(page === "fiche"){  
    loadFiches();  
  }  
}  
function showUsers(){  
  let box = document.getElementById("usersBox");  
  box.innerHTML = "";  
  
  for(let uid in usersList){  
    if(uid !== currentUser){  
      let u = usersList[uid];  
  
      let div = document.createElement("div");  
      div.innerHTML = `  
        <button onclick="openChat('${uid}')">  
          ${u.name} (${u.email})  
        </button>  
      `;  
  
      box.appendChild(div);  
    }  
  }  
}  
function openChat(uid){  
  
  currentChat = uid;  
  go("chat");  
  
  let chatId = getChatId(currentUser, uid);  
  
  // 🔥 message livré  
  db.ref("chats/" + chatId + "/messages").once("value", snap => {  
    snap.forEach(msg => {  
      if(msg.val().sender !== currentUser){  
        msg.ref.update({status:"delivered"});  
      }  
    });  
  });  
  
  markAsRead(chatId);  
  loadMessages();  
}  
function sendMessage(){  
  let text = document.getElementById("msgInput").value;  
  if(text === "") return;  
  
  let chatId = getChatId(currentUser, currentChat);  
  
  db.ref("chats/" + chatId + "/messages").push({  
    sender: currentUser,  
    text,  
    time: Date.now(),  
    status: "sent"  
  });  
  
  document.getElementById("msgInput").value = "";  
}  
  function getChatId(a,b){  
  return a < b ? a+"_"+b : b+"_"+a;  
}  
function loadMessages(){  
  let chatId = getChatId(currentUser, currentChat);  
  
  db.ref("chats/" + chatId + "/messages").on("value", snap => {  
    let box = document.getElementById("chatBox");  
    box.innerHTML = "";  
  
    snap.forEach(msgSnap => {  
      let m = msgSnap.val();  
  
      let div = document.createElement("div");  
  
      div.className = "msg " + (m.sender === currentUser ? "me" : "other");  
  
      let tick = "";  
  
if(m.status === "sent") tick = "✓";  
if(m.status === "delivered") tick = "✓✓";  
if(m.status === "read") tick = "✓✓💙";  
        
      div.innerHTML = `  
  ${m.text}<br>  
  <small>${tick}</small>  
  <br>  
  <span style="color:red;cursor:pointer;font-size:12px;"  
  onclick="deleteMsg('${msgSnap.key}','${chatId}')">  
  Supprimer  
  </span>  
`;  
  
      box.appendChild(div);  
    });  
  });  
}  
    
function markAsRead(chatId){  
  db.ref("chats/" + chatId + "/messages")  
  .once("value", snap => {  
    snap.forEach(msg => {  
      if(msg.val().sender !== currentUser){  
        msg.ref.update({status:"read"});  
      }  
    });  
  });  
}  
  function exportPDF(id){  
  db.ref("fiches/" + currentUser + "/" + id).once("value").then(snap => {  
  
    let d = snap.val();  
    const { jsPDF } = window.jspdf;  
    let doc = new jsPDF();  
  
    doc.text("Fiche de préparation", 10, 10);  
    doc.text("Enseignant: " + d.teacher, 10, 20);  
    doc.text("Matière: " + d.matiere, 10, 30);  
    doc.text("Classe: " + d.classe, 10, 40);  
  
    doc.save("fiche.pdf");  
  });  
}  
    
    
function loadContacts(){  
  let box = document.getElementById("contactsBox");  
  box.innerHTML = "<h3>Mes contacts</h3>";  
  
  db.ref("contacts/" + currentUser).once("value").then(snap => {  
  
    if(!snap.exists()){  
      box.innerHTML += "<p>Aucun contact</p>";  
      return;  
    }  
  
    snap.forEach(c => {  
      let uid = c.key;  
  
      db.ref("users/" + uid).once("value").then(uSnap => {  
        let u = uSnap.val();  
  
        let div = document.createElement("div");  
  
        div.style.display = "flex";  
        div.style.alignItems = "center";  
        div.style.margin = "10px";  
        div.style.padding = "10px";  
        div.style.background = "#111b21";  
        div.style.borderRadius = "10px";  
  
        div.innerHTML = `  
          <img src="${u.photo}" width="40" height="40"  
          style="border-radius:50%;margin-right:10px;">  
            
          <div style="flex:1;">  
            <b>${u.name}</b><br>  
            <small>${u.email}</small>  
          </div>  
        `;  
  
        // 👉 CLIQUER ouvre chat  
        div.onclick = () => openChat(uid);  
  
        box.appendChild(div);  
      });  
    });  
  });  
}  
function toggleMenu(){  
  let m = document.getElementById("menuPlus");  
  m.style.display = (m.style.display === "block") ? "none" : "block";  
}  
function openContacts(){  
  document.getElementById("menuPlus").style.display = "none";  
  
  let email = prompt("Entrer email du contact");  
  
  if(!email) return;  
  
  db.ref("users").once("value").then(snap => {  
    snap.forEach(u => {  
      let user = u.val();  
      let uid = u.key;  
  
      if(user.email === email){  
  
        // 🔥 AJOUT CONTACT  
        db.ref("contacts/" + currentUser + "/" + uid).set(true);  
  
        alert("Contact ajouté !");  
        loadContacts();  
      }  
    });  
  });  
}  
  
// filtre recherche  
function filterContacts(text){  
  db.ref("users").once("value").then(snap => {  
    let box = document.getElementById("contactsBox");  
    box.innerHTML = "";  
  
    snap.forEach(u => {  
      let user = u.val();  
      let uid = u.key;  
  
      if(user.name.toLowerCase().includes(text.toLowerCase())){  
        renderUser(box, user, uid);  
      }  
    });  
  });  
}  
    
function renderUser(box, u, uid){  
  
  if(uid === currentUser) return;  
  
  let div = document.createElement("div");  
  
  div.style.display = "flex";  
  div.style.alignItems = "center";  
  div.style.margin = "10px";  
  div.style.padding = "10px";  
  div.style.background = "#111b21";  
  div.style.borderRadius = "10px";  
  
  div.innerHTML = `  
    <div style="position:relative;margin-right:10px;">  
      <img src="${u.photo}" width="40" height="40" style="border-radius:50%;">  
      <div style="  
        width:10px;  
        height:10px;  
        background:${u.online ? 'lime' : 'gray'};  
        border-radius:50%;  
        position:absolute;  
        bottom:0;  
        right:0;  
      "></div>  
    </div>  
  
    <div style="flex:1;">  
      <b>${u.name}</b><br>  
      <small>${u.email}</small>  
    </div>  
  
    <button onclick="openChat('${uid}')">Chat</button>  
  `;  
  
  box.appendChild(div);  
}  
    
function openGroups(){  
  document.getElementById("menuPlus").style.display = "none";  
  
  let name = prompt("Nom du groupe");  
  if(!name) return;  
  
  let members = [currentUser];  
  
  db.ref("users").once("value").then(snap => {  
    snap.forEach(u => {  
      let user = u.val();  
      let uid = u.key;  
  
      if(uid !== currentUser){  
        if(confirm("Ajouter " + user.name + " ?")){  
          members.push(uid);  
        }  
      }  
    });  
  
    let id = "group_" + Date.now();  
  
    db.ref("groups/" + id).set({  
      name,  
      members  
    });  
  
    alert("Groupe créé !");  
  });  
}  
    
function openSettings(){  
  document.getElementById("menuPlus").style.display = "none";  
  
  let newName = prompt("Changer ton nom");  
  if(!newName) return;  
  
  db.ref("users/" + currentUser).update({  
    name: newName  
  });  
  
  alert("Profil mis à jour !");  
}  
function deleteMsg(msgId, chatId){  
  db.ref("chats/" + chatId + "/messages/" + msgId).remove();  
}  
  function newDiscussion(){  
  document.getElementById("menuPlus").style.display = "none";  
  go("newChat");  
  
  let box = document.getElementById("usersBox");  
  box.innerHTML = "";  
  
  db.ref("users").once("value").then(snap => {  
    snap.forEach(u => {  
      let user = u.val();  
      let uid = u.key;  
  
      if(uid !== currentUser){  
  
        let div = document.createElement("div");  
  
        div.style.background = "#111b21";  
        div.style.margin = "10px";  
        div.style.padding = "10px";  
        div.style.borderRadius = "10px";  
  
        div.innerHTML = `  
          <b>${user.name}</b><br>  
          <small>${user.email}</small>  
        `;  
  
        div.onclick = () => startChat(uid, user.name);  
  
        box.appendChild(div);  
      }  
    });  
  });  
}  
    
  function startChat(uid, name){  
  currentChat = uid;  
  
  document.getElementById("chatWith").innerText = name;  
  
  go("discussion");  
  
  loadMessages();  
}  
  function openGroups(){  
  go("groupsPage");  
}  
  
function openSettings(){  
  go("settingsPage");  
}  
// ================= FICHE DE PREPARATION =================  
function saveFiche(){  
  
  let id = editFicheId || ("fiche_" + Date.now());  
  
  db.ref("users/" + currentUser).once("value").then(userSnap => {  
  
    let teacherName = userSnap.val().name;  
  
    let data = {  
      teacher: teacherName,  
      matiere: matiere.value,  
      classe: classe.value,  
      date: date.value,  
      heure: heure.value,  
      duree: duree.value,  
      objectif: objectif.value,  
      prerequis: prerequis.value,  
      materiel: materiel.value,  
      intro: intro.value,  
      developpement: developpement.value,  
      conclusion: conclusion.value,  
      evaluation: evaluation.value,  
      remarque: remarque.value  
    };  
  
    db.ref("fiches/" + currentUser + "/" + id).set(data);  
  
    alert("Fiche enregistrée ✅");  
  
    editFicheId = null;  
    clearForm();  
    loadFiches();  
  });  
}
  // ================= FICHE SYSTEM =================  
  
let editFicheId = null;  
  
// 🔥 ENREGISTRER OU MODIFIER  
function saveFiche(){  
  
  let matiere = document.getElementById("matiere").value;  
  let classe = document.getElementById("classe").value;  
  let date = document.getElementById("date").value;  
  let objectif = document.getElementById("objectif").value;  
  let contenu = document.getElementById("contenu").value;  
  let evaluation = document.getElementById("evaluation").value;  
  
  if(matiere === "" || classe === ""){  
    alert("Remplis matière et classe");  
    return;  
  }  
  
  let id = editFicheId || ("fiche_" + Date.now());  
  
  db.ref("fiches/" + currentUser + "/" + id).set({  
    matiere,  
    classe,  
    date,  
    objectif,  
    contenu,  
    evaluation  
  });  
  
  alert(editFicheId ? "Fiche modifiée ✅" : "Fiche enregistrée ✅");  
  
  editFicheId = null;  
  clearForm();  
  loadFiches();  
}  
  
// 🔥 CHARGER LISTE  
function renderFiche(id, d){  
  
  let box = document.getElementById("ficheList");  
  
  let div = document.createElement("div");  
  
  div.style.background = "#111b21";  
  div.style.padding = "10px";  
  div.style.margin = "10px";  
  div.style.borderRadius = "10px";  
  
  div.innerHTML = `  
    <b>${d.matiere}</b> - ${d.classe}<br>  
    <small>${d.date} | ${d.teacher}</small><br><br>  
  
    <button onclick="editFiche('${id}')">✏️</button>  
    <button onclick="deleteFiche('${id}')">🗑</button>  
    <button onclick="printFiche('${id}')">🖨</button>  
  `;  
  
  box.appendChild(div);  
}  
  
// 🔥 MODIFIER  
function editFiche(id){  
  
  db.ref("fiches/" + currentUser + "/" + id).once("value").then(snap => {  
    let d = snap.val();  
  
    document.getElementById("matiere").value = d.matiere;  
    document.getElementById("classe").value = d.classe;  
    document.getElementById("date").value = d.date;  
    document.getElementById("objectif").value = d.objectif;  
    document.getElementById("contenu").value = d.contenu;  
    document.getElementById("evaluation").value = d.evaluation;  
  
    editFicheId = id;  
  
    alert("Modification en cours...");  
  });  
}  
  
// 🔥 SUPPRIMER  
function deleteFiche(id){  
  
  if(confirm("Supprimer cette fiche ?")){  
    db.ref("fiches/" + currentUser + "/" + id).remove();  
    loadFiches();  
  }  
}  
  
// 🔥 VIDER FORMULAIRE  
function clearForm(){  
  document.getElementById("matiere").value = "";  
  document.getElementById("classe").value = "";  
  document.getElementById("date").value = "";  
  document.getElementById("objectif").value = "";  
  document.getElementById("contenu").value = "";  
  document.getElementById("evaluation").value = "";  
}  
function searchFiches(){  
  let text = document.getElementById("searchFiche").value.toLowerCase();  
  
  db.ref("fiches/" + currentUser).once("value").then(snap => {  
    let box = document.getElementById("ficheList");  
    box.innerHTML = "";  
  
    snap.forEach(f => {  
      let d = f.val();  
  
      if(d.matiere.toLowerCase().includes(text) || d.classe.toLowerCase().includes(text)){  
        renderFiche(f.key, d);  
      }  
    });  
  });  
}  
function filterMatiere(m){  
  db.ref("fiches/" + currentUser).once("value").then(snap => {  
    let box = document.getElementById("ficheList");  
    box.innerHTML = "";  
  
    snap.forEach(f => {  
      let d = f.val();  
  
      if(m === "" || d.matiere === m){  
        renderFiche(f.key, d);  
      }  
    });  
  });  
}  
    
  function printFiche(id){  
  db.ref("fiches/" + currentUser + "/" + id).once("value").then(snap => {  
    let d = snap.val();  
  
    let w = window.open("");  
  
    w.document.write(`  
      <h2>Fiche de préparation</h2>  
      <p><b>Enseignant:</b> ${d.teacher}</p>  
      <p><b>Matière:</b> ${d.matiere}</p>  
      <p><b>Classe:</b> ${d.classe}</p>  
      <p><b>Date:</b> ${d.date}</p>  
      <hr>  
      <p>${d.developpement}</p>  
    `);  
  
    w.print();  
  });  
}
