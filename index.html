<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Système École PRO</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
body{font-family:Segoe UI,Tahoma,sans-serif;margin:0;padding:0;background:#1e1f26;color:#eaeaea;display:flex;flex-direction:column;align-items:center}
h2{color:#00d4ff;text-align:center}h3{color:#ffcc00;text-align:center}
.section{width:100%;max-width:900px;background:#2a2c36;margin:15px 0;padding:25px;border-radius:15px}
input,select{width:100%;padding:14px;margin:8px 0;border:none;border-radius:10px;background:#1e1f26;color:#fff}
button{width:100%;padding:14px;border:none;border-radius:10px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#00d4ff,#0066ff)}
table{width:100%;border-collapse:collapse;background:#fff;color:#000}
th{background:#0066ff;color:#fff;padding:14px}td{padding:12px;text-align:center}
#fiche{max-width:900px;background:#fff;color:#000;padding:20px;border-radius:15px}
</style></head>
<body>

<script>
firebase.initializeApp({
apiKey:"XXX",
authDomain:"multi-ecole.firebaseapp.com",
databaseURL:"https://multi-ecole-default-rtdb.europe-west1.firebasedatabase.app/",
projectId:"multi-ecole"
});
const db=firebase.database();
</script>

<div class="section">
<h2>Créer école</h2>
<input id="nomEcole"><input id="codeEcole">
<button onclick="ajouterEcole()">Ajouter</button>
<select id="ecoleSelect"></select>
</div>

<div class="section">
<h3>École</h3>
<select id="ecole" onchange="afficher()"></select>
</div>

<div class="section">
<h2>Formulaire</h2>
<select id="role" onchange="formulaire()">
<option>DIR</option><option>ENS</option><option>ELV</option>
</select>
<input id="nom"><input id="postnom"><input id="prenom">
<select id="sexe"><option>M</option><option>F</option></select>
<div id="plus"></div>
<button onclick="enregistrer()">OK</button>
</div>

<div class="section">
<input id="recherche" onkeyup="afficher()" placeholder="recherche">
<select id="filtreRole" onchange="afficher()">
<option value="">Tous</option><option>DIR</option><option>ENS</option><option>ELV</option>
</select>
</div>

<div class="section"><table><thead><tr>
<th>Mat</th><th>Nom</th><th>Post</th><th>Prénom</th><th>École</th><th>Actions</th>
</tr></thead><tbody id="tableau"></tbody></table></div>

<div id="fiche"></div>

<script>

let edit=-1,cDIR=1,cENS=1,cELV=1;

function ajouterEcole(){
let id="ECOLE-"+Date.now();
db.ref("ecoles/"+id).set({id,nom:nomEcole.value,code:codeEcole.value});
nomEcole.value="";codeEcole.value="";charger();
}

function charger(){
db.ref("ecoles").once("value",s=>{
let d=s.val()||{};
ecoleSelect.innerHTML="";ecole.innerHTML="";
for(let k in d){
ecoleSelect.innerHTML+=`<option value="${d[k].id}">${d[k].nom}</option>`;
ecole.innerHTML+=`<option value="${d[k].id}">${d[k].nom}</option>`;
}
});
}

function mat(r){
if(r=="DIR")return"D-DIR-"+String(cDIR++).padStart(4,"0")+"-S";
if(r=="ENS")return"D-ENS-"+String(cENS++).padStart(4,"0")+"-S";
return"D-ELV-"+String(cELV++).padStart(4,"0")+"-S";
}

function formulaire(){
plus.innerHTML=role.value=="ENS"?'<input id="ct">':role.value=="ELV"?
'<input id="age"><input id="classe"><input id="parent">':"";
}

function enregistrer(){
let id=ecoleSelect.value;
let d={ecoleID:id,role:role.value,matricule:mat(role.value),nom:nom.value,postnom:postnom.value,prenom:prenom.value,sexe:sexe.value};
if(role.value=="ENS")d.classeTitulaire=ct?.value||"";
if(role.value=="ELV"){d.age=age?.value||"";d.classe=classe?.value||"";d.parent=parent?.value||""}
if(edit==-1)db.ref("perso").push(d);
else db.ref("perso/"+edit).set(d),edit=-1;
afficher();
}

function afficher(){
db.ref("perso").on("value",s=>{
let d=s.val()||{},t="";
for(let k in d){
let x=d[k];
if(filtreRole.value && x.role!=filtreRole.value)continue;
if(recherche.value && !(x.nom+x.postnom+x.prenom).toLowerCase().includes(recherche.value.toLowerCase()))continue;
t+=`<tr><td>${x.matricule}</td><td>${x.nom}</td><td>${x.postnom}</td><td>${x.prenom}</td><td>${x.ecoleID}</td>
<td><button onclick="voir('${k}')">V</button><button onclick="sup('${k}')">S</button></td></tr>`;
}
tableau.innerHTML=t;
});
}

function voir(i){
db.ref("perso/"+i).once("value",s=>{
let p=s.val();
fiche.innerHTML=`${p.nom} ${p.postnom} ${p.prenom}<br>${p.matricule}`;
});
}

function sup(i){db.ref("perso/"+i).remove();}

window.onload=()=>{charger();formulaire();afficher()};

</script></body></html>
