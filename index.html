<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Système Scolaire</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<style>
/* ================= GLOBAL ================= */
body{
  margin:0;
  font-family:Arial;
  background:#0b141a;
  color:white;
}

/* ================= CENTRAGE ================= */
.page{
  display:none;
  min-height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
}

.active{
  display:flex;
}

/* ================= TITRES ================= */
h1,h2{
  color:#25D366;
}

/* ================= INPUTS ================= */
input, select, textarea{
  width:90%;
  max-width:400px;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  outline:none;
}

/* ================= BUTTONS ================= */
button{
  width:90%;
  max-width:300px;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:#25D366;
  color:black;
  font-weight:bold;
}

/* ================= MOBILE ADAPT ================= */
@media (max-width:600px){
  h1,h2{ font-size:20px; }
  button{ width:95%; }
}
</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home" class="page active">
  <h1>Système Scolaire</h1>

  <button onclick="go('login')">Connexion</button>
  <button onclick="go('register')">Inscription</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="page">
  <h2>Connexion</h2>

  <input id="logEmail" placeholder="Email">
  <input id="logPass" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>

  <p id="error" style="color:red;"></p>

  <button onclick="go('home')">Retour</button>
</div>

<!-- ================= REGISTER ================= -->
<div id="register" class="page">
  <h2>Inscription</h2>

  <input id="regName" placeholder="Nom">
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Mot de passe">

  <select id="regRole">
    <option value="eleve">Élève</option>
    <option value="enseignant">Enseignant</option>
  </select>

  <button onclick="register()">Créer compte</button>

  <button onclick="go('home')">Retour</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="page">
  <h2 id="welcome"></h2>
  <p id="roleText"></p>

  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= FIREBASE ================= */
 const firebaseConfig = {  
  apiKey: "AIzaSyDcgJDckF9vejT476nYTGHAwa75dotPkMA",  
  authDomain: "multi-ecole.firebaseapp.com",  
  databaseURL: "https://multi-ecole-default-rtdb.europe-west1.firebasedatabase.app",  
  projectId: "multi-ecole",  
  storageBucket: "multi-ecole.firebasestorage.app",  
  messagingSenderId: "421233691634",  
  appId: "1:421233691634:web:c6884b8250c8cd1b7b796b"  
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

/* ================= NAVIGATION ================= */
function go(page){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* ================= REGISTER ================= */
function register(){
  let name = document.getElementById("regName").value;
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPass").value;
  let role = document.getElementById("regRole").value;

  if(!name || !email || !pass) return alert("Remplis tous les champs");

  auth.createUserWithEmailAndPassword(email, pass)
  .then((cred) => {

    db.ref("users/" + cred.user.uid).set({
      name,
      email,
      role
    });

    alert("Compte créé !");
    go("login");
  })
  .catch(err => alert(err.message));
}

/* ================= LOGIN ================= */
function login(){
  let email = document.getElementById("logEmail").value;
  let pass = document.getElementById("logPass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then((cred) => {
    loadUser(cred.user.uid);
  })
  .catch(err => {
    document.getElementById("error").innerText = err.message;
  });
}

/* ================= LOAD USER ================= */
function loadUser(uid){
  currentUser = uid;

  db.ref("users/" + uid).once("value").then(snap => {
    let u = snap.val();

    document.getElementById("welcome").innerText = "Bienvenue " + u.name;
    document.getElementById("roleText").innerText = "Rôle : " + u.role;

    go("dashboard");
  });
}

/* ================= LOGOUT ================= */
function logout(){
  auth.signOut();
  go("home");
}
</script>

</body>
</html>
